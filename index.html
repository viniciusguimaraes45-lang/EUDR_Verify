<!DOCTYPE html>
<html lang="pt" data-lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lote #BR-24-09 · Fazenda Vale do Cerrado</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,700&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --ink: #0E0A06;
  --parch: #F2E8D5;
  --amber: #C98B2A;
  --gold: #E2AC4A;
  --sage: #6B8C6A;
  --fog: #A89F90;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background: var(--ink);
  color: var(--parch);
  font-family: 'Playfair Display', serif;
}

/* LANG BAR */
.lang-bar{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:flex-end;
  padding:1rem 2rem;
  background:#0E0A06;
}
.lang-btn{
  font-family:'Fira Code', monospace;
  font-size:.7rem;
  padding:.4rem 1rem;
  border:1px solid #555;
  background:none;
  color:#ccc;
  cursor:pointer;
}
.lang-btn.active{color:#E2AC4A;border-color:#E2AC4A}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:6rem 2rem;
}

.hero-title{
  font-size:3rem;
}

.hero-desc{
  margin-top:1rem;
  color:var(--fog);
}

/* QR */
.qr-box{
  margin-top:2rem;
  background:#F2E8D5;
  padding:20px;
  display:inline-block;
}
</style>
</head>

<body>

<div class="lang-bar">
  <button class="lang-btn active" id="btn-pt" onclick="setLang('pt')">PT</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>

<div class="hero">
  <h1 class="hero-title">
    Arábica <em>Natural</em>
  </h1>

  <p class="hero-desc">
    Café especial do Cerrado Mineiro, com notas de chocolate e laranja madura.
  </p>

  <div class="qr-box">
    <div id="qrcode"></div>
  </div>
</div>

<script>
function setLang(l){
  document.documentElement.setAttribute('data-lang',l);
  document.getElementById('btn-pt').classList.toggle('active',l==='pt');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
}

new QRCode(document.getElementById("qrcode"),{
  text:"https://viniciusguimaraes45-lang.github.io/EUDR_Verify/",
  width:200,
  height:200
});
</script>

</body>
</html>
